<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Config-Driven GitHub Profile Engine">
  <title>GitHub Profile</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Config (must load before modules) -->
  <script src="config.js"></script>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading GitHub Profile...</p>
  </div>

  <!-- Main Container -->
  <div id="app" class="app-container" style="display: none;">
    <!-- Header Component -->
    <header id="header" class="header">
      <div class="header-left">
        <div class="profile-views" id="profileViews">
          <i class="fas fa-eye"></i>
          <span id="viewCount">Loading...</span>
        </div>
      </div>
      <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon theme-icon"></i>
      </div>
    </header>

    <!-- Profile Section -->
    <section id="profile" class="profile-section">
      <!-- Profile component will be rendered here -->
    </section>

    <!-- Stats Section -->
    <section id="stats" class="stats-section">
      <!-- Stats component will be rendered here -->
    </section>

    <!-- Contribution Graph Section -->
    <section id="contributions" class="contributions-section">
      <h2 class="section-title"><i class="fas fa-chart-line"></i> Contribution Activity</h2>
      <div id="contributionsContainer" class="contributions-container">
        <!-- Contribution graph will be rendered here -->
      </div>
    </section>

    <!-- Pinned Repos Section -->
    <section id="pinnedRepos" class="repos-section">
      <h2 class="section-title"><i class="fas fa-star"></i> Pinned Repositories</h2>
      <div id="pinnedReposContainer" class="repos-container">
        <!-- Pinned repo cards will be rendered here -->
      </div>
    </section>

    <!-- All Repos Section -->
    <section id="allRepos" class="repos-section">
      <h2 class="section-title"><i class="fas fa-folder-open"></i> All Repositories</h2>
      <div id="allReposContainer" class="repos-container">
        <!-- All repo cards will be rendered here -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>
        Powered by 
        <a href="https://github.com" target="_blank">GitHub API</a>
        | 
        <a href="https://github.com/darkmintis/darkmintis.github.io" target="_blank">
          Fork This Engine
        </a>
      </p>
    </footer>
  </div>

  <!-- Error Container -->
  <div id="error" class="error-container" style="display: none;">
    <div class="error-content">
      <h1><i class="fas fa-exclamation-triangle"></i> Error</h1>
      <p id="errorMessage"></p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="src/github.js"></script>
  <script type="module" src="src/theme.js"></script>
  <script type="module" src="src/animations.js"></script>
  <script type="module" src="src/renderer.js"></script>
  <script type="module" src="components/Profile.js"></script>
  <script type="module" src="components/Stats.js"></script>
  <script type="module" src="components/RepoCards.js"></script>
  <script type="module" src="components/Header.js"></script>
  <script type="module" src="components/Contributions.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
